<script>
        // --- SUPABASE CLIENT SETUP ---
        const SUPABASE_URL = "https://mdyiyemshupvcejxquyh.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_NZ-61nnHkjLeIx1uQHZJ6A_hchytu0t";

        const logiFlowSupabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // --- RUNTIME APPLICATION MATRIX CODES ---
        let currentRole = '';
        let currentManifestData = [];
        let globalPersonnelList = [];
        let configuredBreaks = [];
        let globalShipmentNumbers = [];
        let activeRowActivityLogs = []; 

        let computedMetricsSummary = {
            truckTypes: [],
            totalQty: 0,
            netHours: 0,
            finalHours: 0,
            appliedBreaks: []
        };

        window.addEventListener('DOMContentLoaded', async () => {
            calculateOperationalDayWindow();
            switchSystemTab('tab-workbench');
            await refreshConfiguredBreaks();
            await refreshPersonnelRosterPool();
            await pullGlobalShipmentAutofillReferences();
            await refreshBulletinBoard();
        });

        function switchSystemTab(activeTabId) {
            document.querySelectorAll('.tab-content').forEach(element => element.classList.add('hidden'));
            document.getElementById(activeTabId).classList.remove('hidden');

            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('bg-emerald-600', 'text-white', 'border', 'border-emerald-500');
                btn.classList.add('text-slate-400', 'hover:text-slate-200');
            });
            const targetedNavButton = document.getElementById(`nav-${activeTabId}`);
            if(targetedNavButton) {
                targetedNavButton.classList.remove('text-slate-400', 'hover:text-slate-200');
                targetedNavButton.classList.add('bg-emerald-600', 'text-white', 'border', 'border-emerald-500');
            }
        }

        function calculateOperationalDayWindow() {
            const now = new Date();
            let startOfOpDay = new Date(now);
            startOfOpDay.setHours(5, 0, 0, 0);
            if (now.getHours() < 5) startOfOpDay.setDate(startOfOpDay.getDate() - 1);
            
            let endOfOpDay = new Date(startOfOpDay);
            endOfOpDay.setDate(endOfOpDay.getDate() + 1);
            endOfOpDay.setMilliseconds(endOfOpDay.getMilliseconds() - 1);

            document.getElementById('op-day-display').innerText = 
                `Shift Scope: ${startOfOpDay.toLocaleDateString()} 05:00 AM to ${endOfOpDay.toLocaleDateString()} 04:59 AM`;
            return { startOfOpDay, endOfOpDay };
        }

        function setWorkbenchRole(roleName) {
            currentRole = roleName;
            document.querySelectorAll('.wb-role-btn').forEach(btn => {
                btn.classList.remove('bg-emerald-600', 'border-emerald-500', 'text-white', 'shadow-lg');
                btn.classList.add('bg-slate-900/40', 'border-slate-800', 'text-slate-300');
            });
            
            const tgtBtn = document.getElementById(`role-select-${roleName}`);
            if(tgtBtn) {
                tgtBtn.classList.remove('bg-slate-900/40', 'border-slate-800', 'text-slate-300');
                tgtBtn.classList.add('bg-emerald-600', 'border-emerald-500', 'text-white', 'shadow-lg');
            }

            document.getElementById('hidden-inputs-container').classList.remove('opacity-40', 'pointer-events-none');
            document.getElementById('wb-personnel-input').value = '';
            document.getElementById('wb-shipment-input').value = '';
            document.getElementById('workbench-matrix-viewport').classList.add('hidden');
            
            populatePersonnelAutofillList(roleName);
            evaluateWorkbenchState();
        }

        function populatePersonnelAutofillList(role) {
            const listDataContainer = document.getElementById('autofill-personnel');
            listDataContainer.innerHTML = '';
            globalPersonnelList.filter(p => p.role === role).forEach(p => {
                listDataContainer.innerHTML += `<option value="${p.name}"></option>`;
            });
        }

        async function pullGlobalShipmentAutofillReferences() {
            const { data, error } = await logiFlowSupabase.from('shipments').select('shipment_no');
            if (error) return console.error(error);
            globalShipmentNumbers = [...new Set(data.map(item => item.shipment_no))];
            const listDataContainer = document.getElementById('autofill-shipments');
            listDataContainer.innerHTML = '';
            globalShipmentNumbers.forEach(num => {
                listDataContainer.innerHTML += `<option value="${num}"></option>`;
            });
        }

        function evaluateWorkbenchState() {
            const operatorText = document.getElementById('wb-personnel-input').value.trim();
            const shipmentText = document.getElementById('wb-shipment-input').value.trim();
            const executionBtn = document.getElementById('wb-load-btn');

            if(currentRole && operatorText && shipmentText) {
                executionBtn.disabled = false;
                executionBtn.classList.remove('bg-slate-800', 'text-slate-400', 'pointer-events-none');
                executionBtn.classList.add('bg-emerald-600', 'text-white', 'hover:bg-emerald-500', 'cursor-pointer');
            } else {
                executionBtn.disabled = true;
                executionBtn.classList.add('bg-slate-800', 'text-slate-400', 'pointer-events-none');
                executionBtn.classList.remove('bg-emerald-600', 'text-white', 'hover:bg-emerald-500', 'cursor-pointer');
            }
        }

        async function executeManifestQuery() {
            const shipmentNo = document.getElementById('wb-shipment-input').value.trim();
            
            const resShipments = await logiFlowSupabase.from('shipments').select('*').eq('shipment_no', shipmentNo);
            if(resShipments.error) return alert("System retrieval fault: " + resShipments.error.message);
            currentManifestData = resShipments.data;

            const resLogs = await logiFlowSupabase.from('activity_logs').select('*').eq('shipment_no', shipmentNo);
            activeRowActivityLogs = resLogs.data || [];

            renderManifestTable(currentManifestData);
            document.getElementById('workbench-matrix-viewport').classList.remove('hidden');
            document.getElementById('target-summary-card').classList.add('hidden');
        }

        function renderManifestTable(rows) {
            const tbody = document.getElementById('manifest-rows');
            // Dynamically inject a Shipment No header if it doesn't exist
            const theadTr = document.querySelector('#workbench-matrix-viewport table thead tr');
            if (theadTr && !theadTr.innerHTML.includes('Shipment No')) {
                theadTr.children[1].insertAdjacentHTML('beforebegin', '<th class="p-3">Shipment No</th>');
            }

            tbody.innerHTML = '';

            if(rows.length === 0) {
                tbody.innerHTML = `<tr><td colspan="15" class="p-8 text-center text-slate-500 italic">No matching records found.</td></tr>`;
                return;
            }

            // Find an overall active batch log for this entire shipment if it exists
            const generalBatchLog = activeRowActivityLogs.find(l => !l.so_number && l.role === currentRole);

            rows.forEach((row, i) => {
                // Check for individual row track or fall back to general batch assignment 
                const rowLog = activeRowActivityLogs.find(l => l.so_number === row.so_number && l.role === currentRole) || generalBatchLog;
                
                let statusText = "PENDING";
                let statusClass = "bg-slate-800 text-slate-400";
                let assignedPersonnel = rowLog ? rowLog.personnel_name : "Unassigned";
                let isLocked = false;

                if (row.pgi_date !== null || (rowLog && rowLog.status === 'Completed')) {
                    statusText = "PICKED";
                    statusClass = "bg-emerald-500/20 text-emerald-400 border border-emerald-500/30";
                } else if (rowLog && (rowLog.status === 'Ongoing' || rowLog.status === 'Paused')) {
                    statusText = rowLog.status.toUpperCase();
                    statusClass = rowLog.status === 'Paused' ? "bg-amber-500/20 text-amber-400 border border-amber-500/30" : "bg-blue-500/20 text-blue-400 border border-blue-500/30 animate-pulse";
                }

                const currentUserInput = document.getElementById('wb-personnel-input').value.trim();
                if (rowLog && rowLog.personnel_name !== currentUserInput && rowLog.status !== 'Completed') {
                    isLocked = true; 
                }
                if (statusText === "PICKED") {
                    isLocked = true; 
                }

                let analyticsString = "---";
                if(rowLog && rowLog.start_time) {
                    const startStr = new Date(rowLog.start_time).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                    const compStr = rowLog.end_time ? new Date(rowLog.end_time).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : '--:--';
                    const renderedStr = rowLog.rendered_minutes ? `${rowLog.rendered_minutes} min` : 'Active';
                    analyticsString = `<div class="text-[10px] font-mono leading-tight text-slate-400">In: ${startStr}<br>Out: ${compStr}<br>Net: ${renderedStr}</div>`;
                }

                let actionButtonsHTML = "---";
                if (!isLocked) {
                    const trackingLog = rowLog || generalBatchLog;
                    if (!trackingLog) {
                        actionButtonsHTML = `<button onclick="initiateRowLevelTask(${i})" class="bg-blue-600 hover:bg-blue-500 text-white text-[10px] px-2 py-1 rounded font-bold cursor-pointer">Start Row</button>`;
                    } else if (trackingLog.status === 'Ongoing') {
                        actionButtonsHTML = `
                            <div class="flex gap-1 justify-center">
                                <button onclick="pauseRowLevelTask(${trackingLog.id})" class="bg-amber-600 hover:bg-amber-500 text-white text-[10px] px-2 py-1 rounded font-bold cursor-pointer">Pause</button>
                                <button onclick="completeRowLevelTask(${trackingLog.id}, ${i})" class="bg-emerald-600 hover:bg-emerald-500 text-white text-[10px] px-2 py-1 rounded font-bold cursor-pointer">Complete</button>
                            </div>`;
                    } else if (trackingLog.status === 'Paused') {
                        actionButtonsHTML = `<button onclick="resumeRowLevelTask(${trackingLog.id})" class="bg-purple-600 hover:bg-purple-500 text-white text-[10px] px-2 py-1 rounded font-bold cursor-pointer">Resume</button>`;
                    }
                }

                tbody.innerHTML += `
                    <tr class="hover:bg-slate-900/60 transition ${isLocked ? 'opacity-50 bg-slate-950/40' : ''}">
                        <td class="p-3 text-center">
                            <input type="checkbox" data-index="${i}" onchange="recalculateCalculatedWorkflowMetrics()" ${isLocked ? 'disabled' : ''} class="w-4 h-4 text-emerald-600 bg-slate-900 border-slate-700 rounded focus:ring-emerald-500 cursor-pointer">
                        </td>
                        <td class="p-3 font-mono text-slate-400 text-[11px]">${row.shipment_no}</td>
                        <td class="p-3 font-mono text-slate-300 font-semibold">${row.so_number}</td>
                        <td class="p-3"><span class="px-2 py-0.5 rounded text-[10px] font-bold font-sans tracking-wide uppercase ${statusClass}">${statusText}</span></td>
                        <td class="p-3 text-slate-400 font-medium">${assignedPersonnel}</td>
                        <td class="p-3">${analyticsString}</td>
                        <td class="p-3 text-slate-400 font-mono text-[11px]">${row.route_description || 'N/A'}</td>
                        <td class="p-3 text-center"><span class="px-2 py-0.5 rounded text-[10px] bg-slate-800 text-slate-300 border border-slate-700 font-mono">${row.truck_type || 'Unset'}</span></td>
                        <td class="p-3 text-right font-mono text-amber-500">${row.cv}</td>
                        <td class="p-3 text-right font-mono text-blue-400">${row.bx}</td>
                        <td class="p-3 text-right font-mono text-purple-400">${row.pac}</td>
                        <td class="p-3 text-right font-mono text-teal-400">${row.try_qty}</td>
                        <td class="p-3 text-right font-mono text-pink-400">${row.pc}</td>
                        <td class="p-3 text-right font-mono text-emerald-400">${row.kg}</td>
                        <td class="p-3 text-center">${actionButtonsHTML}</td>
                    </tr>`;
            });
        }

        async function initiateRowLevelTask(rowIndex) {
            const rowItem = currentManifestData[rowIndex];
            const operatorName = document.getElementById('wb-personnel-input').value.trim();
            const shipmentNo = document.getElementById('wb-shipment-input').value.trim();

            const { error } = await logiFlowSupabase.from('activity_logs').insert([{
                shipment_no: shipmentNo,
                so_number: rowItem.so_number,
                role: currentRole,
                personnel_name: operatorName,
                total_qty: (rowItem.cv + rowItem.bx + rowItem.pac + rowItem.try_qty + rowItem.pc + rowItem.kg),
                status: 'Ongoing',
                start_time: new Date().toISOString(),
                accumulated_seconds: 0
            }]);

            if (error) alert("Write error: " + error.message);
            else await executeManifestQuery();
        }

        async function pauseRowLevelTask(logId) {
            const { data, error: fetchErr } = await logiFlowSupabase.from('activity_logs').select('*').eq('id', logId).single();
            if(fetchErr) return console.error(fetchErr);

            const elapsedSeconds = Math.floor((new Date() - new Date(data.start_time)) / 1000);
            const totalSecs = (data.accumulated_seconds || 0) + elapsedSeconds;

            const { error } = await logiFlowSupabase.from('activity_logs').update({
                status: 'Paused',
                accumulated_seconds: totalSecs,
                start_time: null 
            }).eq('id', logId);

            if (error) alert("Mutation error: " + error.message);
            else {
                await executeManifestQuery();
                await refreshBulletinBoard();
            }
        }

        async function resumeRowLevelTask(logId) {
            const { error } = await logiFlowSupabase.from('activity_logs').update({
                status: 'Ongoing',
                start_time: new Date().toISOString()
            }).eq('id', logId);

            if (error) alert("Mutation error: " + error.message);
            else {
                await executeManifestQuery();
                await refreshBulletinBoard();
            }
        }

        async function completeRowLevelTask(logId, rowIndex) {
            const { data: logEntry, error: fetchErr } = await logiFlowSupabase.from('activity_logs').select('*').eq('id', logId).single();
            if(fetchErr) return console.error(fetchErr);

            const currentSessionSeconds = logEntry.start_time ? Math.floor((new Date() - new Date(logEntry.start_time)) / 1000) : 0;
            const totalElapsedSeconds = (logEntry.accumulated_seconds || 0) + currentSessionSeconds;
            let netDurationMinutes = Math.round(totalElapsedSeconds / 60);

            const taskStartTime = logEntry.start_time ? new Date(logEntry.start_time) : new Date();
            const taskEndTime = new Date();
            let overlappingBreakMinutes = 0;

            configuredBreaks.forEach(b => {
                if (b.start_time && b.end_time) {
                    const [sHours, sMins] = b.start_time.split(':').map(Number);
                    const [eHours, eMins] = b.end_time.split(':').map(Number);

                    const bStart = new Date(taskStartTime); bStart.setHours(sHours, sMins, 0, 0);
                    const bEnd = new Date(taskStartTime); bEnd.setHours(eHours, eMins, 0, 0);
                    if (bEnd < bStart) bEnd.setDate(bEnd.getDate() + 1);

                    const maxStart = new Date(Math.max(taskStartTime, bStart));
                    const minEnd = new Date(Math.min(taskEndTime, bEnd));

                    if (maxStart < minEnd) {
                        overlappingBreakMinutes += Math.round((minEnd - maxStart) / 1000 / 60);
                    }
                }
            });

            netDurationMinutes = Math.max(0, netDurationMinutes - overlappingBreakMinutes);

            const { error } = await logiFlowSupabase.from('activity_logs').update({
                status: 'Completed',
                end_time: taskEndTime.toISOString(),
                rendered_minutes: netDurationMinutes
            }).eq('id', logId);

            if (error) alert("Task save update exception: " + error.message);
            else {
                await executeManifestQuery();
                await refreshBulletinBoard();
            }
        }

        function recalculateCalculatedWorkflowMetrics() {
            let totalQtySelected = 0;
            let netTargetHours = 0;
            let targetTrucks = [];
            let trackedBreaks = [];

            const checkboxes = document.querySelectorAll('#manifest-rows input[type="checkbox"]:checked');
            checkboxes.forEach(cb => {
                const idx = parseInt(cb.getAttribute('data-index'));
                const item = currentManifestData[idx];

                if(item.truck_type) targetTrucks.push(item.truck_type);

                const rowQtySum = item.cv + item.bx + item.pac + item.try_qty + item.pc + item.kg;
                totalQtySelected += rowQtySum;

                const speedRate = ["AUV", "4W", "6W", "10W", "20F", "40"].includes(item.truck_type?.toUpperCase()) ? 180 : 110;
                netTargetHours += (rowQtySum / speedRate);
            });

            const now = new Date();
            const estimatedNetCompletionDate = new Date(now.getTime() + (netTargetHours * 60 * 60 * 1000));
            let totalBreakHoursToApply = 0;

            configuredBreaks.forEach(b => {
                if (b.start_time && b.end_time) {
                    const [sHours, sMins] = b.start_time.split(':').map(Number);
                    const [eHours, eMins] = b.end_time.split(':').map(Number);
                    const breakStartDate = new Date(now); breakStartDate.setHours(sHours, sMins, 0, 0);
                    const breakEndDate = new Date(now); breakEndDate.setHours(eHours, eMins, 0, 0);
                    if (breakEndDate < breakStartDate) breakEndDate.setDate(breakEndDate.getDate() + 1);

                    if (now < breakEndDate && estimatedNetCompletionDate > breakStartDate) {
                        totalBreakHoursToApply += (b.duration_minutes / 60);
                        trackedBreaks.push(`${b.break_name} (${b.start_time} - ${b.end_time})`);
                    }
                }
            });

            const finalizedTargetTime = netTargetHours > 0 ? (netTargetHours + totalBreakHoursToApply) : 0;

            computedMetricsSummary = {
                truckTypes: [...new Set(targetTrucks)],
                totalQty: totalQtySelected,
                netHours: netTargetHours,
                finalHours: finalizedTargetTime,
                appliedBreaks: trackedBreaks
            };

            document.getElementById('summary-total-qty').innerText = totalQtySelected.toFixed(2);
            document.getElementById('summary-target-hours').innerText = netTargetHours.toFixed(2);
            document.getElementById('summary-final-hours').innerText = finalizedTargetTime.toFixed(2);

            const displayCard = document.getElementById('target-summary-card');
            if(checkboxes.length > 0) displayCard.classList.remove('hidden');
            else displayCard.classList.add('hidden');
        }

        function formatHoursToHHMM(decimalHours) {
            if (isNaN(decimalHours) || decimalHours <= 0) return "00:00";
            const totalMinutes = Math.round(decimalHours * 60);
            return `${String(Math.floor(totalMinutes / 60)).padStart(2, '0')}:${String(totalMinutes % 60).padStart(2, '0')}`;
        }

        function openConfirmationModal() {
            document.getElementById('modal-val-operator').innerText = document.getElementById('wb-personnel-input').value.trim();
            document.getElementById('modal-val-role').innerText = currentRole;
            document.getElementById('modal-val-shipment').innerText = document.getElementById('wb-shipment-input').value.trim();
            document.getElementById('modal-val-truck').innerText = computedMetricsSummary.truckTypes.join(', ') || 'N/A';
            document.getElementById('modal-val-qty').innerText = computedMetricsSummary.totalQty.toFixed(2) + " Units";
            
            document.getElementById('modal-val-net-time').innerText = formatHoursToHHMM(computedMetricsSummary.netHours) + " (HH:MM)";
            document.getElementById('modal-val-total-rendered').innerText = formatHoursToHHMM(computedMetricsSummary.finalHours);

            const breakBox = document.getElementById('modal-val-breaks-list');
            if (computedMetricsSummary.appliedBreaks.length > 0) {
                breakBox.innerHTML = computedMetricsSummary.appliedBreaks.map(bk => `• ${bk}`).join('<br>');
            } else {
                breakBox.innerHTML = "None (No overlapping breaks detected)";
            }

            document.getElementById('custom-confirm-modal').classList.remove('hidden');
        }

        function closeConfirmationModal() {
            document.getElementById('custom-confirm-modal').classList.add('hidden');
        }

        async function commitJobTransaction() {
            const operatorName = document.getElementById('wb-personnel-input').value.trim();
            const shipmentNo = document.getElementById('wb-shipment-input').value.trim();

            const { error } = await logiFlowSupabase.from('activity_logs').insert([{
                shipment_no: shipmentNo,
                role: currentRole,
                personnel_name: operatorName,
                total_qty: computedMetricsSummary.totalQty,
                target_hours: computedMetricsSummary.finalHours,
                status: 'Ongoing',
                start_time: new Date().toISOString()
            }]);

            closeConfirmationModal();

            if(!error) {
                document.getElementById('workbench-matrix-viewport').classList.add('hidden');
                document.getElementById('wb-personnel-input').value = '';
                document.getElementById('wb-shipment-input').value = '';
                evaluateWorkbenchState();
                await refreshBulletinBoard();
            } else {
                alert("Database save rejected: " + error.message);
            }
        }

        async function refreshPersonnelRosterPool() {
            const { data, error } = await logiFlowSupabase.from('personnel').select('*').order('name', { ascending: true });
            if (error) return console.error(error);
            globalPersonnelList = data;
            
            const container = document.getElementById('personnel-list-container');
            if(!container) return;
            container.innerHTML = '';
            data.forEach(p => {
                container.innerHTML += `
                    <div class="flex justify-between items-center bg-slate-900 px-3 py-2 rounded text-xs border border-slate-800/60">
                        <span class="text-slate-300 font-mono">${p.name} <span class="text-[10px] text-emerald-400 font-sans">(${p.role})</span></span>
                        <button onclick="deletePersonnelMember(${p.id})" class="text-rose-400 font-bold hover:text-rose-500 text-sm cursor-pointer">×</button>
                    </div>`;
            });
            if(currentRole) populatePersonnelAutofillList(currentRole);
        }

        async function addPersonnelMember(e) {
            e.preventDefault();
            const name = document.getElementById('new-personnel-name').value.trim();
            const role = document.getElementById('new-personnel-role').value;
            const { error } = await logiFlowSupabase.from('personnel').insert([{ name, role }]);
            if (!error) { document.getElementById('personnel-form').reset(); await refreshPersonnelRosterPool(); }
        }

        async function deletePersonnelMember(id) {
            if(!confirm("Drop member from data pool?")) return;
            const { error } = await logiFlowSupabase.from('personnel').delete().eq('id', id);
            if (!error) await refreshPersonnelRosterPool();
        }

        async function refreshConfiguredBreaks() {
            const { data, error } = await logiFlowSupabase.from('break_settings').select('*');
            if (error) return console.error(error);
            configuredBreaks = data;
            
            const container = document.getElementById('break-list-container');
            if(!container) return;
            container.innerHTML = '';
            data.forEach(b => {
                container.innerHTML += `
                    <div class="flex justify-between items-center bg-slate-900 px-3 py-1.5 rounded text-xs border border-slate-800/60">
                        <span class="text-slate-300 font-medium">${b.break_name}</span>
                        <span class="font-mono text-amber-400 font-semibold text-[11px]">${b.start_time} - ${b.end_time}</span>
                    </div>`;
            });
        }

        async function addBreakRule(e) {
            e.preventDefault();
            const name = document.getElementById('break-name').value;
            const startTime = document.getElementById('break-start').value;
            const endTime = document.getElementById('break-end').value;

            const [sh, sm] = startTime.split(':').map(Number);
            const [eh, em] = endTime.split(':').map(Number);
            let diffMins = (eh * 60 + em) - (sh * 60 + sm);
            if (diffMins < 0) diffMins += 24 * 60; 

            const { error } = await logiFlowSupabase.from('break_settings').insert([{ 
                break_name: name, duration_minutes: parseInt(diffMins), start_time: startTime, end_time: endTime
            }]);
            if(!error) { document.getElementById('break-form').reset(); await refreshConfiguredBreaks(); }
        }

        async function processUploads() {
            const shipmentFile = document.getElementById('shipment-file').files[0];
            const truckFile = document.getElementById('truck-file').files[0];
            if(!shipmentFile) return alert("Upload a Shipment dataset configuration.");

            const readExcelJson = (file) => {
                return new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const data = new Uint8Array(e.target.result);
                        const workbook = XLSX.read(data, { type: 'array' });
                        resolve(XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]));
                    };
                    reader.readAsArrayBuffer(file);
                });
            };

            const rawShipments = await readExcelJson(shipmentFile);
            let truckMapping = {};

            if(truckFile) {
                const rawTrucks = await readExcelJson(truckFile);
                rawTrucks.forEach(t => { if(t["SO Number"]) truckMapping[String(t["SO Number"]).trim()] = t["Truck Type"]; });
            }

            const formattedShipments = rawShipments.map(s => {
                const soNum = String(s["SO Number"] || "").trim();
                return {
                    shipment_no: String(s["Shipment No."] || "").trim(),
                    pgi_date: s["PGI Date"] ? new Date(s["PGI Date"]).toISOString() : null,
                    so_number: soNum,
                    obd_number: String(s["OBD Number"] || "").trim(),
                    billing_number: String(s["Billing Number"] || "").trim(),
                    route_description: s["Route Description"],
                    sold_to_party_name: s["Sold To Party Name"],
                    so_amount: parseFloat(String(s["SO Amount"] || "0").replace(/,/g, '')),
                    cv: parseFloat(s["CV"] || 0),
                    bx: parseFloat(s["BX"] || 0),
                    pac: parseFloat(s["PAC"] || 0),
                    try_qty: parseFloat(s["TRY"] || 0),
                    pc: parseFloat(s["PC"] || 0),
                    kg: parseFloat(s["KG"] || 0),
                    truck_type: truckMapping[soNum] || "4W"
                };
            });

            const { error } = await logiFlowSupabase.from('shipments').upsert(formattedShipments, { onConflict: 'so_number' });
            if(!error) { alert("Master Database Sync Complete!"); await pullGlobalShipmentAutofillReferences(); }
        }

        async function refreshBulletinBoard() {
            const { startOfOpDay } = calculateOperationalDayWindow();
            
            const { data, error } = await logiFlowSupabase.from('activity_logs')
                .select('*')
                .gte('start_time', startOfOpDay.toISOString())
                .order('start_time', { ascending: false });

            if(error) return console.error(error);
            
            // Render Bottom Floor Dispatch Control Bulletin Container
            const container = document.getElementById('bulletin-container');
            if(container) {
                container.innerHTML = '';
                if(data.length === 0) {
                    container.innerHTML = `<div class="col-span-full text-center text-xs text-slate-500 py-6 border border-dashed border-slate-800 rounded-xl">No batch dispatches loaded for this shift window.</div>`;
                } else {
                    data.forEach(log => {
                        container.innerHTML += `
                            <div class="bg-slate-950 border border-slate-800 rounded-xl p-4 space-y-3 relative">
                                <div class="absolute top-0 right-0 text-[9px] uppercase font-mono tracking-wider px-2 py-0.5 ${log.status === 'Completed' ? 'bg-emerald-500/20 text-emerald-400' : 'bg-amber-500/20 text-amber-400'} rounded-bl">
                                    ${log.status}
                                </div>
                                <div>
                                    <span class="text-[10px] font-bold tracking-wider text-slate-500 block uppercase">${log.role}</span>
                                    <span class="text-sm font-bold text-slate-200 font-mono">${log.shipment_no} ${log.so_number ? `| SO: ${log.so_number}` : ''}</span>
                                </div>
                                <div class="grid grid-cols-2 gap-2 text-xs text-slate-400 font-mono">
                                    <div>Op: <strong class="text-slate-200">${log.personnel_name}</strong></div>
                                    <div>Vol: <strong class="text-amber-400">${log.total_qty} units</strong></div>
                                </div>
                            </div>`;
                    });
                }
            }

            // Sync actions to the "My Ongoing Task Lines" side panel component dynamically
            const sidePanelContentContainer = document.querySelector('span[id^="op-day-display"]')?.closest('body')?.querySelector('.bg-slate-950\\/40')?.parentElement || document.querySelector('.bg-slate-950\\/50')?.parentElement;
            const ongoingTargetBox = document.body.innerHTML.includes('My Ongoing Task Lines') ? Object.assign(document.createElement('div'), {innerHTML: 'found'}) : null;
            
            // Fallback strategy: Querying the explicit text area container matching your UI wrapper layout
            const structuralSideBoxes = Array.from(document.querySelectorAll('div')).find(el => el.textContent.includes('My Ongoing Task Lines') && el.children.length > 0);
            if (structuralSideBoxes) {
                const targetListLayout = structuralSideBoxes.querySelector('.border') || structuralSideBoxes;
                const ongoingTasks = data.filter(l => l.status === 'Ongoing' || l.status === 'Paused');
                
                if (ongoingTasks.length === 0) {
                    targetListLayout.innerHTML = `<div class="text-slate-500 text-xs italic p-4 text-center">No ongoing task loops open.</div>`;
                } else {
                    targetListLayout.innerHTML = '<h3 class="text-xs font-bold text-slate-400 mb-3 px-2 uppercase tracking-wide">Real-Time Sync Processing Lines</h3>';
                    ongoingTasks.forEach(task => {
                        let actionButtons = '';
                        if (task.status === 'Ongoing') {
                            actionButtons = `
                                <button onclick="pauseRowLevelTask(${task.id})" class="bg-amber-600 hover:bg-amber-500 text-[10px] text-white px-2 py-1 rounded font-bold cursor-pointer">Pause</button>
                                <button onclick="completeRowLevelTask(${task.id}, 0)" class="bg-emerald-600 hover:bg-emerald-500 text-[10px] text-white px-2 py-1 rounded font-bold cursor-pointer">Complete</button>`;
                        } else {
                            actionButtons = `<button onclick="resumeRowLevelTask(${task.id})" class="bg-purple-600 hover:bg-purple-500 text-[10px] text-white px-2 py-1 rounded font-bold cursor-pointer">Resume</button>`;
                        }

                        targetListLayout.innerHTML += `
                            <div class="bg-slate-900 border border-slate-800 rounded-xl p-3 mb-2 space-y-2 text-xs">
                                <div class="flex justify-between items-center">
                                    <span class="font-mono text-emerald-400 font-bold">${task.shipment_no}</span>
                                    <span class="text-[9px] uppercase font-bold px-1.5 py-0.5 rounded ${task.status === 'Ongoing' ? 'bg-blue-500/20 text-blue-400' : 'bg-amber-500/20 text-amber-400'}">${task.status}</span>
                                </div>
                                <div class="text-slate-400 font-mono text-[11px]">Op: <span class="text-slate-200 font-sans font-medium">${task.personnel_name}</span> | Vol: <span class="text-amber-400">${task.total_qty} units</span></div>
                                <div class="flex gap-1 pt-1 justify-end">${actionButtons}</div>
                            </div>`;
                    });
                }
            }
        }

        function runInlineMatrixFilter() {
            const query = document.getElementById('inline-search').value.toLowerCase().trim();
            document.querySelectorAll('#manifest-rows tr').forEach(row => {
                row.textContent.toLowerCase().includes(query) ? row.classList.remove('hidden') : row.classList.add('hidden');
            });
        }

        function clearInlineFilters() { 
            const el = document.getElementById('inline-search');
            if(el) el.value = ''; 
            runInlineMatrixFilter(); 
        }
    </script>
